name: Validate Agents & Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks scan (PR-compatible)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-agents:
    name: Validate Agent Configurations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Validate agents
        run: node scripts/validate-agents.js

  validate-command-matrices:
    name: Validate Command Matrix Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Validate command matrix docs parity
        run: node scripts/validate-command-matrices.js

  validate-docs:
    name: Validate Documentation Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Validate documentation links
        run: node scripts/validate-docs.js

  validate-tooling-tests:
    name: Validate Tooling Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run docs validator tests
        run: node scripts/validate-docs.test.js

      - name: Run agent validator tests
        run: node scripts/validate-agents.test.js

  validate-agent-evals:
    name: Validate Agent Eval Harness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run agent eval harness
        run: npm run eval:agents

      - name: Run agent eval harness tests
        run: node scripts/eval-harness.test.js

  validate-context:
    name: Validate Context Size
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Check context size
        run: node scripts/check-context-size.js --check

  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint markdown
        run: npm run lint:md

      - name: Check for markdown lint issues
        if: failure()
        run: |
          echo "::warning::Markdown linting failed. Run 'npm run lint:md:fix' to auto-fix issues."

  lint-workflows:
    name: Lint GitHub Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5.0.2
        with:
          go-version: 'stable'

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Lint workflows with actionlint
        run: |
          GOPATH="$(go env GOPATH)"
          "$GOPATH/bin/actionlint"

  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [secrets-scan, validate-agents, validate-command-matrices, validate-docs, validate-tooling-tests, validate-agent-evals, validate-context, lint-markdown, lint-workflows]
    if: always()

    steps:
      - name: Check validation results
        env:
          AGENTS_RESULT: ${{ needs.validate-agents.result }}
          COMMAND_MATRIX_RESULT: ${{ needs.validate-command-matrices.result }}
          SECRETS_RESULT: ${{ needs.secrets-scan.result }}
          DOCS_RESULT: ${{ needs.validate-docs.result }}
          TOOLING_TESTS_RESULT: ${{ needs.validate-tooling-tests.result }}
          AGENT_EVAL_RESULT: ${{ needs.validate-agent-evals.result }}
          CONTEXT_RESULT: ${{ needs.validate-context.result }}
          LINT_RESULT: ${{ needs.lint-markdown.result }}
          WORKFLOW_LINT_RESULT: ${{ needs.lint-workflows.result }}
        run: |
          echo "Secret Scan: ${SECRETS_RESULT}"
          echo "Agent Validation: ${AGENTS_RESULT}"
          echo "Command Matrix Docs: ${COMMAND_MATRIX_RESULT}"
          echo "Documentation Validation: ${DOCS_RESULT}"
          echo "Tooling Tests: ${TOOLING_TESTS_RESULT}"
          echo "Agent Eval Harness: ${AGENT_EVAL_RESULT}"
          echo "Context Validation: ${CONTEXT_RESULT}"
          echo "Markdown Linting: ${LINT_RESULT}"
          echo "Workflow Linting: ${WORKFLOW_LINT_RESULT}"

          if [ "${SECRETS_RESULT}" != "success" ] || \
             [ "${AGENTS_RESULT}" != "success" ] || \
             [ "${COMMAND_MATRIX_RESULT}" != "success" ] || \
             [ "${DOCS_RESULT}" != "success" ] || \
             [ "${TOOLING_TESTS_RESULT}" != "success" ] || \
             [ "${AGENT_EVAL_RESULT}" != "success" ] || \
             [ "${CONTEXT_RESULT}" != "success" ] || \
             [ "${LINT_RESULT}" != "success" ] || \
             [ "${WORKFLOW_LINT_RESULT}" != "success" ]; then
            echo "::error::One or more validation checks failed"
            exit 1
          fi

          echo "✅ All validation checks passed!"
