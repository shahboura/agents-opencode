name: Validate Agents & Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-agents:
    name: Validate Agent Configurations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Validate agents
        run: node scripts/validate-agents.js

  validate-docs:
    name: Validate Documentation Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Validate documentation links
        run: node scripts/validate-docs.js

  validate-context:
    name: Validate Context Size
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Check context size
        run: node scripts/check-context-size.js --check

  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint markdown
        run: npm run lint:md

      - name: Check for markdown lint issues
        if: failure()
        run: |
          echo "::warning::Markdown linting failed. Run 'npm run lint:md:fix' to auto-fix issues."

  lint-workflows:
    name: Lint GitHub Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5.0.2
        with:
          go-version: 'stable'

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Lint workflows with actionlint
        run: |
          GOPATH="$(go env GOPATH)"
          "$GOPATH/bin/actionlint"

  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [validate-agents, validate-docs, validate-context, lint-markdown, lint-workflows]
    if: always()

    steps:
      - name: Check validation results
        env:
          AGENTS_RESULT: ${{ needs.validate-agents.result }}
          DOCS_RESULT: ${{ needs.validate-docs.result }}
          CONTEXT_RESULT: ${{ needs.validate-context.result }}
          LINT_RESULT: ${{ needs.lint-markdown.result }}
          WORKFLOW_LINT_RESULT: ${{ needs.lint-workflows.result }}
        run: |
          echo "Agent Validation: ${AGENTS_RESULT}"
          echo "Documentation Validation: ${DOCS_RESULT}"
          echo "Context Validation: ${CONTEXT_RESULT}"
          echo "Markdown Linting: ${LINT_RESULT}"
          echo "Workflow Linting: ${WORKFLOW_LINT_RESULT}"

          if [ "${AGENTS_RESULT}" != "success" ] || \
             [ "${DOCS_RESULT}" != "success" ] || \
             [ "${CONTEXT_RESULT}" != "success" ] || \
             [ "${LINT_RESULT}" != "success" ] || \
             [ "${WORKFLOW_LINT_RESULT}" != "success" ]; then
            echo "::error::One or more validation checks failed"
            exit 1
          fi

          echo "✅ All validation checks passed!"
