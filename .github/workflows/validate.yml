name: Validate Agents & Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
   validate-agents:
     name: Validate Agent Configurations
     runs-on: ubuntu-latest
     timeout-minutes: 10

     steps:
       - name: Checkout code
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
         with:
           persist-credentials: false

       - name: Setup Node.js
         uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
         with:
           node-version: '20'

       - name: Validate agents
         run: node scripts/validate-agents.js

       - name: Check context size
         run: node scripts/check-context-size.js --check

   validate-docs:
     name: Validate Documentation Links
     runs-on: ubuntu-latest
     timeout-minutes: 10

     steps:
       - name: Checkout code
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
         with:
           persist-credentials: false

       - name: Setup Node.js
         uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
         with:
           node-version: '20'

       - name: Validate documentation links
         run: node scripts/validate-docs.js

   lint-markdown:
     name: Lint Markdown Files
     runs-on: ubuntu-latest
     timeout-minutes: 10

     steps:
       - name: Checkout code
         uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
         with:
           persist-credentials: false

       - name: Setup Node.js
         uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
         with:
           node-version: '20'
           cache: 'npm'

       - name: Install dependencies
         run: npm ci

       - name: Lint markdown
         run: npm run lint:md

       - name: Check for markdown lint issues
         if: failure()
         run: |
           echo "::warning::Markdown linting failed. Run 'npm run lint:md:fix' to auto-fix issues."

   validation-summary:
     name: Validation Summary
     runs-on: ubuntu-latest
     timeout-minutes: 5
     needs: [validate-agents, validate-docs, lint-markdown]
     if: always()

     steps:
       - name: Check validation results
         env:
           AGENTS_RESULT: ${{ needs.validate-agents.result }}
           DOCS_RESULT: ${{ needs.validate-docs.result }}
           LINT_RESULT: ${{ needs.lint-markdown.result }}
         run: |
           echo "Agent Validation: ${AGENTS_RESULT}"
           echo "Documentation Validation: ${DOCS_RESULT}"
           echo "Markdown Linting: ${LINT_RESULT}"

           if [ "${AGENTS_RESULT}" != "success" ] || \
              [ "${DOCS_RESULT}" != "success" ] || \
              [ "${LINT_RESULT}" != "success" ]; then
             echo "::error::One or more validation checks failed"
             exit 1
           fi

           echo "✅ All validation checks passed!"
