name: Validate Agents & Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks scan (PR-compatible)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-agents:
    name: Validate Agent Configurations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Validate agents
        run: node scripts/validate-agents.js

  validate-command-matrices:
    name: Validate Command Matrix Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Validate command matrix docs parity
        run: node scripts/validate-command-matrices.js

  validate-risk-path:
    name: Validate Risk-Scored Review Path
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Determine changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed-files.txt
          else
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"
            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" > changed-files.txt
            else
              git show --pretty="" --name-only "$AFTER_SHA" > changed-files.txt
            fi
          fi

      - name: Write PR body snapshot
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf "%s" "${PR_BODY:-}" > pr-body.txt

      - name: Assess risk path
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node scripts/assess-risk-path.js --changed-files-file changed-files.txt --pr-body-file pr-body.txt --require-ack
          else
            node scripts/assess-risk-path.js --changed-files-file changed-files.txt
          fi

  validate-docs:
    name: Validate Documentation Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Validate documentation links
        run: node scripts/validate-docs.js

  validate-changelog:
    name: Validate Changelog Capability Labels
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Validate changelog capability labels
        run: node scripts/validate-changelog-labels.js

  validate-session-state:
    name: Validate Session State Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Validate session state
        run: node scripts/validate-session-state.js

      - name: Generate handoff packet
        run: node scripts/generate-handoff.js --state state/session-state.json --out handoff/latest.md

      - name: Upload handoff artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: handoff-packet
          path: handoff/latest.md
          if-no-files-found: error

  validate-tooling-tests:
    name: Validate Tooling Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run docs validator tests
        run: node scripts/validate-docs.test.js

      - name: Run agent validator tests
        run: node scripts/validate-agents.test.js

      - name: Run risk-path assessment tests
        run: node scripts/assess-risk-path.test.js

      - name: Run changelog validator tests
        run: node scripts/validate-changelog-labels.test.js

      - name: Run session-state validator tests
        run: node scripts/validate-session-state.test.js

      - name: Run handoff generator tests
        run: node scripts/generate-handoff.test.js

  validate-agent-evals:
    name: Validate Agent Eval Harness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Run agent eval harness
        run: npm run eval:agents

      - name: Generate agent eval JSON report
        run: npm run eval:agents:json

      - name: Generate agent eval trend snapshot
        run: npm run eval:agents:trend

      - name: Upload agent eval artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-eval-reports
          path: |
            evals/reports/latest.json
            evals/reports/trend-summary.md
          if-no-files-found: error

      - name: Run agent eval harness tests
        run: node scripts/eval-harness.test.js

  validate-context:
    name: Validate Context Size
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Check context size
        run: node scripts/check-context-size.js --check

  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint markdown
        run: npm run lint:md

      - name: Check for markdown lint issues
        if: failure()
        run: |
          echo "::warning::Markdown linting failed. Run 'npm run lint:md:fix' to auto-fix issues."

  lint-workflows:
    name: Lint GitHub Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v5.0.2
        with:
          go-version: 'stable'

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Lint workflows with actionlint
        run: |
          GOPATH="$(go env GOPATH)"
          "$GOPATH/bin/actionlint"

  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [secrets-scan, validate-agents, validate-command-matrices, validate-risk-path, validate-docs, validate-changelog, validate-session-state, validate-tooling-tests, validate-agent-evals, validate-context, lint-markdown, lint-workflows]
    if: always()

    steps:
      - name: Check validation results
        env:
          AGENTS_RESULT: ${{ needs.validate-agents.result }}
          COMMAND_MATRIX_RESULT: ${{ needs.validate-command-matrices.result }}
          RISK_PATH_RESULT: ${{ needs.validate-risk-path.result }}
          SECRETS_RESULT: ${{ needs.secrets-scan.result }}
          DOCS_RESULT: ${{ needs.validate-docs.result }}
          CHANGELOG_RESULT: ${{ needs.validate-changelog.result }}
          SESSION_STATE_RESULT: ${{ needs.validate-session-state.result }}
          TOOLING_TESTS_RESULT: ${{ needs.validate-tooling-tests.result }}
          AGENT_EVAL_RESULT: ${{ needs.validate-agent-evals.result }}
          CONTEXT_RESULT: ${{ needs.validate-context.result }}
          LINT_RESULT: ${{ needs.lint-markdown.result }}
          WORKFLOW_LINT_RESULT: ${{ needs.lint-workflows.result }}
        run: |
          echo "Secret Scan: ${SECRETS_RESULT}"
          echo "Agent Validation: ${AGENTS_RESULT}"
          echo "Command Matrix Docs: ${COMMAND_MATRIX_RESULT}"
          echo "Risk Path Validation: ${RISK_PATH_RESULT}"
          echo "Documentation Validation: ${DOCS_RESULT}"
          echo "Changelog Validation: ${CHANGELOG_RESULT}"
          echo "Session State Validation: ${SESSION_STATE_RESULT}"
          echo "Tooling Tests: ${TOOLING_TESTS_RESULT}"
          echo "Agent Eval Harness: ${AGENT_EVAL_RESULT}"
          echo "Context Validation: ${CONTEXT_RESULT}"
          echo "Markdown Linting: ${LINT_RESULT}"
          echo "Workflow Linting: ${WORKFLOW_LINT_RESULT}"

          if [ "${SECRETS_RESULT}" != "success" ] || \
             [ "${AGENTS_RESULT}" != "success" ] || \
             [ "${COMMAND_MATRIX_RESULT}" != "success" ] || \
             [ "${RISK_PATH_RESULT}" != "success" ] || \
             [ "${DOCS_RESULT}" != "success" ] || \
             [ "${CHANGELOG_RESULT}" != "success" ] || \
             [ "${SESSION_STATE_RESULT}" != "success" ] || \
             [ "${TOOLING_TESTS_RESULT}" != "success" ] || \
             [ "${AGENT_EVAL_RESULT}" != "success" ] || \
             [ "${CONTEXT_RESULT}" != "success" ] || \
             [ "${LINT_RESULT}" != "success" ] || \
             [ "${WORKFLOW_LINT_RESULT}" != "success" ]; then
            echo "::error::One or more validation checks failed"
            exit 1
          fi

          echo "✅ All validation checks passed!"
